<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="description" content="Vectorium - The New Standard of Vector Control">
    <title>Vectorium - The New Standard of Vector Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }

        body {
            font-family: 'Chakra Petch', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            color: #1a2744;
        }

        .container {
            text-align: center;
            padding: 48px 28px;
            max-width: 400px;
            width: 100%;
        }

        /* Logo */
        .logo-wrap {
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeUp 0.7s ease forwards 0.15s;
        }

        .logo-wrap img {
            width: 220px;
            max-width: 75%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Slogan */
        .slogan {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1.2px;
            color: #3a7ca5;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeUp 0.7s ease forwards 0.3s;
        }

        /* Link Buttons */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 44px;
            opacity: 0;
            animation: fadeUp 0.7s ease forwards 0.45s;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 20px;
            border: 1.5px solid #1a2744;
            border-radius: 10px;
            text-decoration: none;
            color: #1a2744;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
            background: #ffffff;
            cursor: pointer;
        }

        .link-btn:active {
            background: #1a2744;
            color: #ffffff;
        }

        .link-btn:active svg path {
            fill: #ffffff;
        }

        @media (hover: hover) {
            .link-btn:hover {
                background: #1a2744;
                color: #ffffff;
                box-shadow: 0 6px 20px rgba(26, 39, 68, 0.12);
            }
            .link-btn:hover svg path {
                fill: #ffffff;
            }
        }

        .link-btn svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* Coming Soon */
        .coming-soon {
            opacity: 0;
            animation: fadeUp 0.7s ease forwards 0.6s;
        }

        .coming-soon-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            background: linear-gradient(135deg, #1a2744 0%, #2a4a6b 100%);
            color: #ffffff;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #4ecdc4;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .coming-soon-text {
            margin-top: 14px;
            font-size: 12px;
            color: #9aabb8;
            font-weight: 400;
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            font-size: 10px;
            color: #c0c8d0;
            letter-spacing: 0.3px;
            opacity: 0;
            animation: fadeUp 0.7s ease forwards 0.75s;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Small phones (SE, Galaxy S series) */
        @media (max-width: 380px) {
            .container {
                padding: 36px 20px;
            }
            .logo-wrap img {
                width: 180px;
            }
            .slogan {
                font-size: 11px;
                margin-bottom: 32px;
            }
            .link-btn {
                padding: 13px 16px;
                font-size: 13px;
            }
        }

        /* Landscape phone */
        @media (max-height: 500px) {
            body {
                align-items: flex-start;
            }
            .container {
                padding: 20px 28px;
            }
            .slogan {
                margin-bottom: 24px;
            }
            .links {
                margin-bottom: 24px;
            }
            .footer {
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>

        </div>

        <div class="coming-soon">
            <div class="coming-soon-badge">
                <span class="dot"></span>
                Coming Soon
            </div>

        </div>

        <div class="footer">
            &copy; 2026 Vectorium Inc. All rights reserved.
        </div>

    </div>
</body>
</html>
